<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  a { text-decoration: none; color: inherit; }
</style>
</helmet>

<div style="min-height:100%; background:#e9e9ec; display:flex; justify-content:center; font-family:'Noto Sans JP', sans-serif;">
  <div style="width:100%; max-width:430px; min-height:100vh; background:#fff; display:flex; flex-direction:column; box-shadow:0 0 50px rgba(20,20,40,.1);">

    <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 24px 6px;">
      <span style="font-size:15px; font-weight:600; color:#111;">9:41</span>
      <div style="display:flex; align-items:center; gap:6px; color:#111;"><span style="font-size:12px;">●●●●</span><span style="font-size:14px;">📶</span><span style="display:inline-block; width:24px; height:12px; border:1px solid #111; border-radius:3px; position:relative;"><span style="position:absolute; inset:1.5px; right:5px; background:#111; border-radius:1px;"></span></span></div>
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between; padding:8px 22px 6px;">
      <a href="店員-01-ホーム.dc.html" style="color:#1f2024;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 8 12l7 7"/></svg></a>
      <span style="font-size:17px; font-weight:700; color:#1f2024;">QRコード</span>
      <span style="width:26px; height:26px; border-radius:50%; border:1.5px solid #d8d9de; display:flex; align-items:center; justify-content:center; color:#9a9da4; font-size:13px; font-weight:700;">?</span>
    </div>

    <div style="flex:1; overflow-y:auto; padding:20px 26px 28px; display:flex; flex-direction:column;">
      <div style="text-align:center; font-size:15px; font-weight:700; color:#1f2024; margin-top:14px;">あなた専用の投げ銭QR</div>

      <div style="display:flex; justify-content:center; margin-top:28px;">
        <div style="position:relative; padding:22px;">
          <!-- corner brackets -->
          <span style="position:absolute; top:0; left:0; width:34px; height:34px; border-top:4px solid #ec3a6d; border-left:4px solid #ec3a6d; border-radius:8px 0 0 0;"></span>
          <span style="position:absolute; top:0; right:0; width:34px; height:34px; border-top:4px solid #ec3a6d; border-right:4px solid #ec3a6d; border-radius:0 8px 0 0;"></span>
          <span style="position:absolute; bottom:0; left:0; width:34px; height:34px; border-bottom:4px solid #ec3a6d; border-left:4px solid #ec3a6d; border-radius:0 0 0 8px;"></span>
          <span style="position:absolute; bottom:0; right:0; width:34px; height:34px; border-bottom:4px solid #ec3a6d; border-right:4px solid #ec3a6d; border-radius:0 0 8px 0;"></span>
          <!-- QR -->
          <div style="position:relative; width:200px; height:200px;">
            <sc-for list="{{ cells }}" as="cell" hint-placeholder-count="0"><span style="{{ cell.style }}"></span></sc-for>
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:48px; height:48px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center;">
              <span style="font-size:26px;">❤️</span>
            </div>
          </div>
        </div>
      </div>

      <div style="text-align:center; font-size:13px; color:#8b8e96; margin-top:24px;">このQRをお客さまに見せてください</div>

      <div style="margin-top:auto; display:flex; flex-direction:column; gap:12px; padding-top:34px;">
        <div style="text-align:center; padding:16px 0; background:#ec3a6d; border-radius:14px; font-size:15px; font-weight:700; color:#fff;">QRをダウンロード</div>
        <div style="text-align:center; padding:16px 0; background:#fff; border:1.5px solid #f3c6d4; border-radius:14px; font-size:15px; font-weight:600; color:#ec3a6d;">名札用のデザインを見る</div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const N = 25, SIZE = 200, m = SIZE / N;
    const on = (r, c) => {
      // finder patterns 7x7 at three corners
      const fp = (br, bc) => {
        const dr = r - br, dc = c - bc;
        if (dr < 0 || dr > 6 || dc < 0 || dc > 6) return null;
        const ring = dr === 0 || dr === 6 || dc === 0 || dc === 6;
        const core = dr >= 2 && dr <= 4 && dc >= 2 && dc <= 4;
        return ring || core;
      };
      const a = fp(0, 0), b = fp(0, N - 7), d = fp(N - 7, 0);
      if (a !== null) return a;
      if (b !== null) return b;
      if (d !== null) return d;
      // quiet zone around finders separators -> off near them
      // pseudo-random data
      const v = Math.sin(r * 12.9898 + c * 78.233) * 43758.5453;
      return (v - Math.floor(v)) > 0.5;
    };
    const cells = [];
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        if (!on(r, c)) continue;
        cells.push({
          style: "position:absolute; width:" + m + "px; height:" + m + "px; left:" + (c * m) + "px; top:" + (r * m) + "px; background:#171a1f; border-radius:1.5px;"
        });
      }
    }
    return { cells };
  }
}
</script>
</body>
</html>

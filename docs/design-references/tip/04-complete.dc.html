<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  a { text-decoration: none; }
  @keyframes pop { 0% { transform: scale(.4); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes spark { 0% { opacity: 0; transform: scale(.5); } 100% { opacity: 1; transform: scale(1); } }
</style>
</helmet>

<div style="min-height:100%; background:#e9e9ec; display:flex; justify-content:center; font-family:'Noto Sans JP', sans-serif;">

      </div>
    </div>

          <span style="position:absolute; top:-6px; right:-4px; color:#f7a8c4; font-size:17px; animation:spark .5s .42s both;">／</span>

      <div style="margin-top:auto; display:flex; flex-direction:column; gap:12px; padding-top:30px;">

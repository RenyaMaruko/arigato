<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  a { text-decoration: none; }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
</helmet>

<div style="position:absolute; width:0; height:0; overflow:hidden; pointer-events:none;"><x-import component-from-global-scope="image-slot" from="./image-slot.js" hint-size="0,0"></x-import></div>

<div style="min-height:100%; background:#e9e9ec; display:flex; justify-content:center; font-family:'Noto Sans JP', sans-serif;">
  <div style="width:100%; max-width:430px; min-height:100vh; background:#fff; display:flex; flex-direction:column; box-shadow:0 0 50px rgba(20,20,40,.1); position:relative; overflow:hidden;">

    <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 24px 6px; flex:none;">
      <span style="font-size:15px; font-weight:600; color:#111;">9:41</span>
      <div style="display:flex; align-items:center; gap:6px; color:#111;">
        <span style="font-size:12px;">●●●●</span>
        <span style="font-size:14px;">📶</span>
        <span style="display:inline-block; width:24px; height:12px; border:1px solid #111; border-radius:3px; position:relative;"><span style="position:absolute; inset:1.5px; right:5px; background:#111; border-radius:1px;"></span></span>
      </div>
    </div>

    <!-- dimmed profile behind sheet -->
    <div style="padding:18px 24px 0;">
      <div style="display:flex; justify-content:center;">
        <image-slot id="staffAvatar" shape="circle" style="width:120px; height:120px;" placeholder="顔写真"></image-slot>
      </div>
      <div style="text-align:center; margin-top:16px;">
        <span style="font-size:21px; font-weight:700; color:#1f2024;">山田 さくら </span><span style="font-size:14px; color:#1f2024;">さん</span>
      </div>
      <div style="text-align:center; font-size:14px; color:#8b8e96; margin-top:4px;">カフェ Arigato</div>
    </div>

    <!-- scrim -->
    <a href="01-金額を選ぶ.dc.html" style="position:absolute; inset:0; background:rgba(20,20,30,.18);"></a>

    <!-- bottom sheet -->
    <div style="position:absolute; left:0; right:0; bottom:0; background:#fff; border-radius:26px 26px 0 0; box-shadow:0 -10px 40px rgba(20,20,40,.16); padding:14px 24px 34px; animation:sheetUp .32s cubic-bezier(.22,1,.36,1);">
      <div style="display:flex; justify-content:center; margin-bottom:14px;"><span style="width:38px; height:4px; border-radius:99px; background:#e2e3e7;"></span></div>
      <div style="display:flex; align-items:center; justify-content:center; position:relative; margin-bottom:20px;">
        <span style="font-size:16px; font-weight:700; color:#1f2024;">支払い方法を選ぶ</span>
        <a href="01-金額を選ぶ.dc.html" style="position:absolute; right:0; font-size:18px; color:#9a9da4;">✕</a>
      </div>
      <a href="04-完了.dc.html" style="display:block; text-align:center; padding:17px 0; background:#000; border-radius:14px; font-size:16px; font-weight:600; color:#fff;"> Pay</a>
      <a href="04-完了.dc.html" style="display:flex; align-items:center; justify-content:center; gap:8px; text-align:center; padding:17px 0; margin-top:12px; background:#fff; border:1.5px solid #e6e7ea; border-radius:14px; font-size:16px; font-weight:600; color:#1f2024;"><span style="font-weight:700; font-size:17px; color:#4285F4;">G</span> Pay</a>

        <div style="flex:1; height:1px; background:#ededf0;"></div>
        <span style="font-size:12px; color:#9a9da4;">または</span>
        <div style="flex:1; height:1px; background:#ededf0;"></div>
      </div>
      <a href="04-完了.dc.html" style="display:flex; align-items:center; justify-content:center; gap:9px; text-align:center; padding:17px 0; background:#fff; border:1.5px solid #e6e7ea; border-radius:14px; font-size:15px; font-weight:600; color:#1f2024;">💳 カードで支払う</a>
      <div style="text-align:center; font-size:11px; color:#9a9da4; margin-top:22px;">🔒 安全な決済で、満額が届きます</div>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
